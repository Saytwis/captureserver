services:
  - type: web
    name: capturewindows-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 60
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NTFY_TOPIC
        sync: false
